key: scaffolding
name: Scaffolding (perimeter, exterior)
trade: general
csi_division: DIVISION 01
units: SQ FT
description_template: |-
  PROVIDE & MAINTAIN PERIMETER SCAFFOLDING @ {location} AS PER {detail_ref} INCLUDING ERECT, RENT, DISMANTLE, INSURANCE & SAFETY NETTING
inputs:
  - name: location
    label: Location
    type: text
    default: ALL FACADES

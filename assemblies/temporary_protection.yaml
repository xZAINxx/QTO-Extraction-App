units: LF
description_template: |-
  PROVIDE & MAINTAIN TEMPORARY PROTECTION @ {location} AS PER {detail_ref} INCLUDING SIDEWALK BRIDGE, OVERHEAD PLANK, GUARD RAILS & SIGNAGE
inputs:

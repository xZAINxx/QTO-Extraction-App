key: gypsum_board_partition
name: Gypsum Board Partition
trade: drywall
csi_division: DIVISION 09
units: SQ FT
description_template: |-
  PROVIDE & INSTALL NEW GYPSUM BOARD PARTITION ({height}' H) @ {location} AS PER {detail_ref} WHICH INCLUDES
  -3-5/8" METAL STUDS @ 16" O.C.
  -5/8" GYPSUM BOARD EACH SIDE
  -ACOUSTICAL INSULATION
  -PERIMETER FIRESTOPPING
inputs:
  - name: height
    label: Wall height (ft)
    type: number
    default: 9
  - name: location
    label: Location
    type: text
    default: GENERAL
  - name: detail_ref
    label: Detail / Legend ref
    type: text
    default: DETAIL 1/A501
  - name: length
    label: Length (ft)
    type: number
    default: 0
  - name: qty
    label: Override quantity (SQ FT)
    type: number
    default: 0
math_trail_template: '({length}'' L X {height}'' H = {area} SQFT)'

extraction_mode: hybrid   # hybrid | claude_only | multi_agent

anthropic_api_key: ""
model: "claude-sonnet-4-6"
max_tokens_per_page_call: 8000

models:
  haiku:  "claude-haiku-4-5-20251001"
  sonnet: "claude-sonnet-4-6"
  opus:   "claude-opus-4-5"

cost_saver_mode: false   # Phase 7: route 24-hour-tolerant calls to messages.batches
references_dir: "./QTO Tool"

# Phase 2: local CV layer. Disabled gracefully if ultralytics or weights missing.
cv:
  enabled: true
  weights: "./cv/weights/floorplancad_general.pt"
  conf_threshold: 0.35
  classes: null   # null = detect all known symbols; e.g. ["door","window","drain"]

title_block_region:
  side: right
  pct: 0.15
sheet_number_regex: '^[A-Z]{1,3}\s*-?\s*\d{2,4}(\.\d{1,2})?$'
scale_regex: "SCALE\\s*[:\\s=]\\s*(\\d+/\\d+\"\\s*=\\s*\\d+['-]\\d+\"|\\d+:\\d+|N\\.?T\\.?S\\.?|AS\\s*SHOWN)"
min_vector_text_length: 10

output_dir: "./output"
cache_dir: "./cache"
template_path: "./ESTIMATE_FORMAT___GC.xlsx"

confidence_review_threshold: 0.75

csi_keywords:
  "DIVISION 02": ["remove", "demolish", "dispose", "strip", "demo"]
  "DIVISION 03": ["concrete", "slab", "footing", "pour"]
  "DIVISION 04": ["brick", "mortar", "cmu", "stone", "repoint", "masonry"]
  "DIVISION 05": ["steel", "metal", "structural", "angle", "beam"]
  "DIVISION 06": ["wood", "millwork", "blocking", "lumber", "casework"]
  "DIVISION 07": ["roof", "membrane", "flashing", "coping", "epdm", "insulation", "waterproof"]
  "DIVISION 08": ["door", "window", "frame", "hardware", "lintel", "locker", "glazing"]
  "DIVISION 09": ["paint", "tile", "flooring", "gypsum", "ceiling", "finish", "epoxy", "grout"]
  "DIVISION 21": ["sprinkler", "fire suppression"]
  "DIVISION 22": ["plumbing", "drain", "pipe", "water", "sanitary", "vent", "fixture", "toilet", "sink"]
  "DIVISION 23": ["hvac", "duct", "mechanical", "fan", "louver", "convector", "ventilation"]
  "DIVISION 26": ["electrical", "panel", "conduit", "lighting", "outlet", "switch"]
  "DIVISION 32": ["paving", "curb", "sidewalk", "site", "exterior", "landscaping"]

units_canonical:
  SF: SQ FT
  SQFT: SQ FT
  "sq.ft.": SQ FT
  sqft: SQ FT
  LNFT: LNFT
  LF: LF
  ft: FT
  EACH: EA
  each: EA
  LS: LS
  CUYD: YARD
  CY: YARD

# в”Ђв”Ђ Multi-agent mode (Phase 8) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# When extraction_mode == "multi_agent", AIClient is replaced by
# MultiAgentClient which dispatches to ai.agents.* using the providers
# configured below. hybrid and claude_only modes ignore these blocks.

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
  nvidia:
    api_key_env: NVIDIA_API_KEY
    chat_base_url: "https://integrate.api.nvidia.com/v1"
    rerank_base_url: "https://ai.api.nvidia.com/v1/retrieval/nvidia/reranking"
    timeout_s: 60

agents:
  page_classifier:
    provider: nvidia
    model: "nvidia/nemotron-mini-4b-instruct"
    temperature: 0.0
    max_tokens: 24
    fast_path_heuristics: true
  vision_extractor:
    provider: nvidia
    model: "meta/llama-4-maverick-17b-128e-instruct"
    temperature: 0.0
    max_tokens: 4000
    fallback_provider: anthropic
    fallback_model: "claude-sonnet-4-6"
  text_extractor:
    provider: nvidia
    model: "mistralai/mistral-nemotron"
    temperature: 0.0
    max_tokens: 2000
  csi_classifier:
    provider: nvidia
    model: "nvidia/nemotron-mini-4b-instruct"
    temperature: 0.0
    max_tokens: 64
  normalizer:
    provider: nvidia
    model: "nvidia/nemotron-mini-4b-instruct"
    temperature: 0.0
    max_tokens: 512
    use_rag_priming: true
    rag_top_k: 5
  orchestrator:
    provider: anthropic
    model: "claude-sonnet-4-6"
    temperature: 0.0
    max_tokens: 1500

rag:
  enabled: false
  embedding_model: "nvidia/nv-embed-v1"
  rerank_model: "nv-rerank-qa-mistral-4b:1"
  store_path: "./cache/historical.db"

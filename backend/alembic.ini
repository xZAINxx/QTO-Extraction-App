# Alembic config for the QTO web backend.
#
# Run from the repo root:
#   alembic -c backend/alembic.ini upgrade head
#   alembic -c backend/alembic.ini revision --autogenerate -m "..."
#
# The actual database URL is sourced at runtime from `backend.config.get_settings()`
# inside `migrations/env.py` — the placeholder below is only used by alembic
# tooling that requires `sqlalchemy.url` to be present.

[alembic]
script_location = %(here)s/db/migrations
prepend_sys_path = %(here)s/..
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://placeholder/placeholder

[post_write_hooks]
# Format generated migrations with black if available.
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
